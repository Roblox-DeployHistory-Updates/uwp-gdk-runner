name: Decrypt & Extract MSIXVC

on:
  workflow_dispatch:
  push:

jobs:
  decrypt:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download Products Info
        run: |
          $productUrl = "https://displaycatalog.mp.microsoft.com/v7.0/products?bigIds=9PMF91N3LZ3M&market=US&languages=en-US,neutral&MS-CV=DGU1mcuYo0WMMp+F.1"
          Invoke-WebRequest -Uri $productUrl -OutFile "products.json"

      - name: Extract info
        id: extract
        shell: pwsh
        run: |
          $contentId = (Get-Content product.json | ConvertFrom-Json).Products[0].DisplaySkuAvailabilities[0].Sku.Properties.Packages[0].ContentId
          $lastUpdateDate = (Get-Content product.json | ConvertFrom-Json).Products[0].DisplaySkuAvailabilities[0].Sku.Properties.LastUpdateDate
          Write-Output "contentId=$contentId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Output "lastUpdateDate=$lastUpdateDate" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Get latest release LastUpdateDate
        id: get_latest
        continue-on-error: true
        shell: pwsh
        run: |
          $latest_json = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/latest" -Headers @{Authorization = "Bearer $env:GITHUB_TOKEN"}
          $desc = $latest_json.body
          if ($desc -match 'LastUpdateDate:\s*(\S+)') {
              $latest_lud = $matches[1]
              Write-Output "latest_last_update=$latest_lud" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
              Write-Output "latest_last_update=none" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Get download URL from MsixvcPackageDownloader
        id: apicall
        if: steps.extract.outputs.lastUpdateDate != steps.get_latest.outputs.latest_last_update
        shell: pwsh
        env:
          MS_TOKEN: ${{ secrets.MS_TOKEN }}
        run: |
          Invoke-WebRequest -Uri "https://github.com/Yakov5776/MsixvcPackageDownloader/releases/download/release-v1.4/dotnet-build.zip" -OutFile "MsixvcPackageDownloader.zip"
          Expand-Archive -Path "MsixvcPackageDownloader.zip" -DestinationPath "."
          Set-Content -Path token.json -Value $env:MS_TOKEN
          $xvc_url = .\MsixvcPackageDownloader.exe (Get-Content token.json)
          Write-Output "xvc_url=$xvc_url" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $filename = [System.IO.Path]::GetFileName($xvc_url)
          Write-Output "filename=$filename" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $decryptedName = [System.IO.Path]::ChangeExtension($filename, '.decrypted.msixvc')
          $outputDir = "unpacked-output"
          $releaseName = [System.IO.Path]::GetFileNameWithoutExtension($filename)

      - name: Update MS_TOKEN secret
        if: steps.extract.outputs.lastUpdateDate != steps.get_latest.outputs.latest_last_update
        shell: pwsh
        env:
          UPDATE_URL: ${{ secrets.SECRET_POST_URL }}
          PUSH_KEY: ${{ secrets.SECRET_POST_TOKEN }}
        run: |
          $NEW_TOKEN = Get-Content token.json -Raw
          $ENCODED_VALUE = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($NEW_TOKEN))
          $body = @{ value = $ENCODED_VALUE } | ConvertTo-Json
          Invoke-RestMethod -Uri $env:UPDATE_URL -Method Post -Headers @{ "x-access-key" = $env:PUSH_KEY; "Content-Type" = "application/json" } -Body $body

      - name: Download MSIXVC
        run: |
          Write-Host "Downloading $env:filename from $env:url"
          Invoke-WebRequest -Uri $env:url -OutFile $env:filename
          Get-Item $env:filename | Format-List

      - name: Download XVDTool (v0.53)
        run: |
          $xvdUrl = 'https://github.com/emoose/xvdtool/releases/download/v0.53/XVDTool-0.53.0.0-win-x64.zip'
          $zip = 'xvdtool.zip'
          Invoke-WebRequest -Uri $xvdUrl -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath tools -Force
          Write-Host "XVDTool expanded to tools"

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '3.1.x'

      - name: Decrypt the .msixvc (using xvdtool)
        run: |
          $xvdExe = Get-ChildItem -Path tools -Filter 'xvdtool.exe' -Recurse | Select-Object -First 1
          if (-not $xvdExe) { throw "xvdtool.exe not found under tools/ after unzip." }
          Copy-Item -Path $env:filename -Destination $env:decryptedName -Force
          $decryptedPath = (Resolve-Path $env:decryptedName).Path
          Write-Host "Running decrypt on: $decryptedPath with $($xvdExe.FullName)"
          & $xvdExe.FullName -nd -eu -cik "5ef5d34b-1201-d8dd-921f-635e939947e0" -cikfile "5ef5d34b-1201-d8dd-921f-635e939947e0.cik" $decryptedPath
          if ($LASTEXITCODE -ne 0) { throw "xvdtool decrypt command failed (exit $LASTEXITCODE)." }

      - name: Extract and zip files from decrypted .msixvc
        run: |
          $xvdExe = Get-ChildItem -Path tools -Filter 'xvdtool.exe' -Recurse | Select-Object -First 1
          $decryptedPath = (Resolve-Path $env:decryptedName).Path
          $outdir = $env:outputDir
          New-Item -Path $outdir -ItemType Directory -Force | Out-Null
          Write-Host "Extracting to $outdir ..."
          & $xvdExe.FullName -nd -xf $outdir $decryptedPath
          if ($LASTEXITCODE -ne 0) { throw "xvdtool extract command failed (exit $LASTEXITCODE)." }
          Compress-Archive -Path ${{ env.outputDir }} -DestinationPath "${{ env.releaseName }}-unpacked.zip"

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ env.filename }},${{ env.decryptedName }},${{ env.releaseName }}-unpacked.zip,products.json"
          tag: ${{ env.releaseName }}
          name: ${{ env.releaseName }}
          body: ${{ env.releaseName }}